<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">one-tool model-facing surface</title>
  <desc id="desc">Flow showing a model calling run(command), the runtime dispatching commands, and the result returning through rooted files, adapters, and memory.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .label { font: 600 16px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #334155; }
      .small { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #475569; }
      .title { font: 700 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="16" y="16" width="1168" height="328" rx="24" fill="url(#bg)" stroke="#cbd5e1"/>
  <text x="48" y="62" class="title">Single tool in, structured runtime out</text>
  <text x="48" y="90" class="subtitle">The model sees one tool. The runtime hides parsing, command dispatch, virtual files, adapters, and output shaping.</text>

  <rect x="50" y="130" width="230" height="160" rx="20" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="80" y="175" class="label">LLM / agent model</text>
  <text x="80" y="205" class="body">Plans with one tool call.</text>
  <rect x="80" y="225" width="170" height="38" rx="12" fill="#e2e8f0"/>
  <text x="95" y="249" class="small">run({ command })</text>

  <rect x="360" y="118" width="470" height="182" rx="24" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="392" y="165" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">one-tool runtime</text>
  <text x="392" y="198" class="body" fill="#dbeafe">Parse the command line, execute pipelines, route commands, and format the final response.</text>
  <rect x="392" y="220" width="190" height="52" rx="14" fill="#eff6ff" opacity="0.96"/>
  <text x="412" y="242" class="label">Execution core</text>
  <text x="412" y="262" class="small">parse → chain → pipeline → handler</text>
  <rect x="610" y="220" width="190" height="52" rx="14" fill="#eef2ff" opacity="0.96"/>
  <text x="630" y="242" class="label">Presentation layer</text>
  <text x="630" y="262" class="small">binary guard → overflow → footer</text>

  <rect x="920" y="110" width="220" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="948" y="145" class="label">Rooted VFS</text>
  <text x="948" y="168" class="body">NodeVFS</text>
  <text x="948" y="188" class="body">MemoryVFS</text>
  <text x="1030" y="188" class="body">BrowserVFS</text>

  <rect x="920" y="214" width="220" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="948" y="249" class="label">External capabilities</text>
  <text x="948" y="272" class="body">search adapter · fetch adapter</text>
  <text x="948" y="292" class="body">SimpleMemory</text>

  <path d="M280 210 C315 210, 325 210, 360 210" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M830 160 C870 160, 880 155, 920 155" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M830 255 C870 255, 880 260, 920 260" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M920 322 C830 334, 520 334, 280 290" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="495" y="331" class="small">formatted result: stdout/stderr + [exit:N | time]</text>
</svg>
