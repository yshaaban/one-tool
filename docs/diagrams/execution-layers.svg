<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Execution and presentation layers</title>
  <desc id="desc">Two-layer view of one-tool showing execution semantics first and presentation shaping after command execution finishes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #475569; }
      .heading { font: 700 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #334155; }
      .chip { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #1e293b; }
    </style>
  </defs>

  <rect x="16" y="16" width="1168" height="388" rx="24" fill="url(#bg)" stroke="#cbd5e1"/>
  <text x="48" y="62" class="title">Execution first, presentation second</text>
  <text x="48" y="90" class="subtitle">Pipes and control operators run on raw command results. Output decoration happens only after execution completes.</text>

  <rect x="48" y="124" width="1104" height="108" rx="22" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="80" y="160" class="heading">Execution layer</text>
  <text x="80" y="186" class="body">Responsible for command correctness and shell-like semantics.</text>
  <rect x="80" y="196" width="165" height="28" rx="14" fill="#ffffff"/>
  <rect x="263" y="196" width="185" height="28" rx="14" fill="#ffffff"/>
  <rect x="466" y="196" width="175" height="28" rx="14" fill="#ffffff"/>
  <rect x="659" y="196" width="180" height="28" rx="14" fill="#ffffff"/>
  <rect x="857" y="196" width="210" height="28" rx="14" fill="#ffffff"/>
  <text x="98" y="215" class="chip">parse command line</text>
  <text x="282" y="215" class="chip">resolve chains and pipes</text>
  <text x="488" y="215" class="chip">dispatch handlers</text>
  <text x="683" y="215" class="chip">move raw stdout bytes</text>
  <text x="882" y="215" class="chip">stop pipeline on failure</text>

  <path d="M600 232 L600 276" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="621" y="259" class="body">then shape the final response</text>

  <rect x="48" y="282" width="1104" height="96" rx="22" fill="#ede9fe" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="80" y="318" class="heading">Presentation and safety layer</text>
  <text x="80" y="344" class="body">Responsible for model-facing ergonomics once the execution result is already final.</text>
  <rect x="620" y="299" width="180" height="28" rx="14" fill="#ffffff"/>
  <rect x="812" y="299" width="150" height="28" rx="14" fill="#ffffff"/>
  <rect x="974" y="299" width="134" height="28" rx="14" fill="#ffffff"/>
  <text x="642" y="318" class="chip">binary guard</text>
  <text x="838" y="318" class="chip">overflow mode</text>
  <text x="998" y="318" class="chip">footer + stderr</text>

  <text x="80" y="365" class="body">This separation preserves pipe semantics while still returning compact, navigable output to the model.</text>
</svg>
