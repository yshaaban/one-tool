name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript test suite
        run: npm test

  snapshots:
    name: Snapshot Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated snapshots are up to date
        run: npm run snapshots:check

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install Python package and test dependencies
        working-directory: python
        run: python -m pip install -e ".[dev]"

      - name: Run Python test suite
        working-directory: python
        run: pytest -q

  python-package-smoke:
    name: Python Package Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install packaged Python distribution
        run: python -m pip install ./python

      - name: Verify public imports
        run: |
          python - <<'PY'
          import onetool
          from onetool import (
              AgentCLI,
              LocalVFS,
              MemoryVFS,
              assert_scenario,
              build_tool_definition,
              build_world,
              create_agent_cli,
              create_command_conformance_cases,
              create_command_registry,
              create_test_command_context,
              run_oracle,
              run_registered_command,
              to_vfs_error,
          )
          from onetool.testing import DemoFetch
          from onetool.vfs import LocalVFS as VfsLocalVFS

          assert AgentCLI is not None
          assert onetool.AgentCLIExecutionPolicy is not None
          assert build_tool_definition is not None
          assert create_agent_cli is not None
          assert LocalVFS is VfsLocalVFS
          assert MemoryVFS is not None
          assert assert_scenario is not None
          assert build_world is not None
          assert callable(create_command_conformance_cases)
          assert to_vfs_error is not None
          assert callable(create_command_registry)
          assert callable(create_test_command_context)
          assert run_oracle is not None
          assert callable(run_registered_command)
          assert DemoFetch is not None
          PY
